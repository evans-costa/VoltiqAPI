services:
  db:
    image: postgres:17-alpine
    container_name: voltiq-db
    environment:
      POSTGRES_DB: VoltiqDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - voltiq-db-data:/var/lib/postgresql/data

volumes:
  voltiq-db-data:
